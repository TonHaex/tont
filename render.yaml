services:
  - type: web
    name: tongpt-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: TONGPT_ALLOWED_ORIGINS
        value: https://tonhaex.nl
      - key: TONGPT_DB_PATH
        value: data/tongpt.sqlite3
